  "Constructor": [
    {q:"How will you call a parameterless constructor? Write one example.",a:`A parameterless (default) constructor takes no arguments. You call it simply using <code>new ClassName()</code>.`,code:`class Student {
  String name;
  Student() {          // parameterless constructor
    name = "Unknown";
  }
}
Student s = new Student(); // calling it`},
    {q:"How will you call a parameterized constructor? Write one example.",a:`A parameterized constructor accepts arguments. Pass values while creating the object.`,code:`class Student {
  String name;
  Student(String n) {  // parameterized constructor
    name = n;
  }
}
Student s = new Student("Jyothi"); // calling it`},
    {q:"Can we have a private constructor?",a:`Yes. A private constructor restricts object creation from outside the class. Used in Singleton pattern.`,code:`class Singleton {
  private static Singleton obj;
  private Singleton() {}   // private constructor
  public static Singleton getInstance() {
    if(obj == null) obj = new Singleton();
    return obj;
  }
}`},
    {q:"Can I override a constructor?",a:`No. Constructors cannot be overridden because they are not inherited. Every class must define its own constructor.`,code:null},
    {q:"Can I overload a constructor?",a:`Yes! You can have multiple constructors with different parameters in the same class.`,code:`class Box {
  Box() { System.out.println("No args"); }
  Box(int l) { System.out.println("One arg: "+l); }
  Box(int l, int b) { System.out.println("Two args"); }
}`},
    {q:"Why can't we override a constructor?",a:`Constructors are not inherited by child classes, so overriding (which requires inheritance) doesn't apply. A constructor's name must match the class name, so a parent constructor can never exist in a child class.`,code:null},
    {q:"How will you call a parent class constructor with no parameters?",a:`Using <code>super()</code> as the first statement in the child constructor.`,code:`class Animal {
  Animal() { System.out.println("Animal created"); }
}
class Dog extends Animal {
  Dog() {
    super();  // calls Animal()
    System.out.println("Dog created");
  }
}`},
    {q:"How will you call a parent class constructor with parameters?",a:`Using <code>super(value)</code> with the matching arguments.`,code:`class Animal {
  Animal(String name) { System.out.println("Animal: "+name); }
}
class Dog extends Animal {
  Dog(String name) {
    super(name);  // calls Animal(String)
  }
}`},
    {q:"How will you call the same class constructor from another constructor?",a:`Using <code>this()</code> — called constructor chaining within the same class.`,code:`class Box {

    this.l=l; this.b=b; this.h=h;
  }
}`},
    {q:"Will it give a compile-time error if we give a return type to a constructor?",a:`No compile error — but it stops being a constructor and becomes a regular method! Java treats it as a method with the same name as the class, which is legal but unusual.`,code:`class A {
  void A() { }   // This is a METHOD, not a constructor!
  A() { }        // This is the actual constructor
}`},
    {q:"In inheritance, which class constructor is executed first?",a:`The parent class constructor always executes first, then the child class constructor. This is because <code>super()</code> is implicitly called as the first line in any child constructor.`,code:`class A { A() { System.out.println("A"); } }
class B extends A { B() { System.out.println("B"); } }
new B(); // Output: A  then  B`},

    return new A();   // only inside the class
  }
}
A obj = A.create();  // correct way`},
    {q:"public class A { public A(int i) {} } — Does the compiler supply a default constructor?",a:`No. The compiler only supplies a default (no-arg) constructor when NO constructor is defined. Since A already has a parameterized constructor, the compiler will NOT add a default one.`,code:null},
    {q:"Will this code compile successfully?\npublic class B extends A { public B(int i) {} }",a:`No — compile error! A only has A(int i), so its no-arg constructor doesn't exist. When B's constructor runs, it implicitly calls super() (no-arg), which doesn't exist in A.`,code:`// Fix: explicitly call super(i)

    {q:"Difference between array and collections.",a:`Array: fixed size, can hold primitives, no built-in methods. Collections: dynamic size, holds only objects, rich API (add, remove, sort, search), part of java.util.`,code:null},
    {q:"In which Java version were collections introduced?",a:`Java 1.2 (JDK 1.2).`,code:null},
    {q:"Difference between collections and generics.",a:`Collections: framework of data structures. Generics (Java 5): allow type-safe collections — you specify what type a collection holds, preventing ClassCastException at runtime.`,code:`List<String> list = new ArrayList<>(); // generics - type safe
list.add("Hello");
// list.add(10); // compile error`},
    {q:"Why are generics safe?",a:`Generics enforce type checking at compile time. Without generics, you'd get ClassCastException at runtime. With generics, wrong types are caught during compilation.`,code:null},
    {q:"Difference between LinkedList and ArrayList — which is best?",a:`ArrayList: backed by array, fast random access O(1), slow insert/delete in middle. LinkedList: doubly linked, fast insert/delete O(1), slow random access O(n). Neither is always better — depends on use case.`,code:null},
    {q:"In which case is LinkedList better?",a:`When you frequently insert or delete elements from the beginning or middle of the list. E.g. implementing a queue or deque.`,code:null},
    {q:"Difference between Vector and ArrayList.",a:`Vector: synchronized (thread-safe), slower, legacy class. ArrayList: not synchronized, faster, preferred for single-threaded apps.`,code:null},
    {q:"Difference between Hashtable and HashMap.",a:`Hashtable: synchronized, thread-safe, no null keys/values, legacy. HashMap: not synchronized, allows one null key and multiple null values, faster.`,code:null},
    {q:"Difference between List and Set (ArrayList vs Set).",a:`List: ordered, allows duplicates, index-based access. Set: unordered (except LinkedHashSet), NO duplicates allowed.`,code:null},
    {q:"Difference between Set and Map.",a:`Set: stores only keys/values (single object), no duplicates. Map: stores key-value pairs, keys must be unique but values can duplicate.`,code:null},
    {q:"Difference between array and List.",a:`Array: fixed size, primitive support, no methods. List: dynamic, object only, rich methods (add, remove, contains etc.).`,code:null},
    {q:"Difference between List and Map.",a:`List: sequential collection of single objects with index. Map: collection of key-value pairs, accessed by key (not index).`,code:null},
  ],
  "Memory & Threads": [
    {q:"How many parts are there in memory?",a:`JVM memory has 5 parts: Heap (objects), Stack (method calls/local vars), Method Area/Metaspace (class info), PC Register, Native Method Stack.`,code:null},
    {q:"What is stored in stack?",a:`Local variables, method call frames, references to heap objects. Each method call creates a new stack frame. Stack is LIFO. Automatically cleared when method returns.`,code:null},
    {q:"What is stored in heap?",a:`All objects (created with new keyword) and instance variables are stored in heap. Heap is managed by garbage collector.`,code:null},
    {q:"What is a garbage collector?",a:`GC is a JVM background process that automatically finds and deletes unreferenced objects from heap memory to free up space. You don't need to manually free memory (unlike C/C++).`,code:null},
    {q:"What is the meaning of unreferenced objects?",a:`An object that has no reference variable pointing to it. GC targets these for deletion. E.g. obj = null makes the previous object unreferenced.`,code:`Student s = new Student(); // referenced
s = null;  // now the Student object is unreferenced -> GC candidate`},
    {q:"What is hashcode?",a:`An integer value returned by hashCode() method, used to identify an object's bucket location in hash-based collections (HashMap, HashSet). Objects that are equal must have the same hashCode.`,code:null},
    {q:"What is synchronization?",a:`Synchronization ensures only one thread can access a shared resource at a time, preventing data inconsistency. Done using the synchronized keyword.`,code:`synchronized void deposit(int amt){ balance += amt; }`},
    {q:"What is thread priority?",a:`Each thread has a priority (1-10). MIN_PRIORITY=1, NORM_PRIORITY=5, MAX_PRIORITY=10. JVM uses this as a hint for scheduling (not guaranteed).`,code:null},
    {q:"What is the main thread?",a:`The main thread is the thread that JVM creates to execute the main() method. All other threads are spawned from it.`,code:null},
    {q:"What is setPriority?",a:`setPriority(int) method sets a thread's priority. Use Thread.MIN_PRIORITY (1), NORM_PRIORITY (5), or MAX_PRIORITY (10).`,code:`Thread t = new Thread(() -> System.out.println("Hi"));
t.setPriority(Thread.MAX_PRIORITY);
t.start();`},
    {q:"What is JRE vs JDK?",a:`JRE (Java Runtime Environment): JVM + libraries — used to RUN Java programs. JDK (Java Development Kit): JRE + compiler (javac) + tools — used to DEVELOP Java programs.`,code:null},
    {q:"What is the use of stack and heap?",a:`Stack: stores method calls and local variables, fast access, auto-managed. Heap: stores all objects, larger, managed by GC. Together they handle Java's runtime memory.`,code:null},
    {q:"What is the current version of Java?",a:`As of 2026, the latest LTS version is Java 21 (released Sept 2023). Java 22 and 23 are also available as non-LTS releases.`,code:null},
    {q:"What is clone()?",a:`clone() (from Object class) creates and returns a copy of the object. The class must implement Cloneable interface, otherwise CloneNotSupportedException is thrown.`,code:`class A implements Cloneable {
  int x = 10;
  public Object clone() throws CloneNotSupportedException {
    return super.clone();
  }
}`},
    {q:"What is the Serializable interface?",a:`Serializable (java.io.Serializable) is a marker interface. It allows objects to be converted to a byte stream (serialized) to save to file or send over network, and reconstructed back (deserialized).`,code:`class Student implements Serializable {
  int id;
  String name;
}`},
    {q:"== vs equals()",a:`== compares references (memory address) — are they the same object? equals() compares content/value — are they logically equal?`,code:`String a = new String("Java");
String b = new String("Java");
System.out.println(a == b);       // false (different objects)
System.out.println(a.equals(b));  // true  (same content)`},
  ]
};

const topicEl = document.getElementById("topics");
const qlistEl = document.getElementById("qlist");
let currentTopic = null;

Object.keys(data).forEach((topic, i) => {
  const btn = document.createElement("button");
  btn.className = "topic-btn" + (i===0?" active":"");
  btn.textContent = topic;
  btn.onclick = () => {
    document.querySelectorAll(".topic-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderQuestions(topic);
  };
  topicEl.appendChild(btn);
});

function renderQuestions(topic) {
  currentTopic = topic;
  qlistEl.innerHTML = "";
  data[topic].forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "q-item";
    div.innerHTML = `
      <div class="q-header" onclick="toggle(this)">
        <span class="q-num">Q${idx+1}</span>
        <span class="q-text">${item.q.replace(/\n/g,"<br>")}</span>
        <i class="ti ti-chevron-down q-arrow" aria-hidden="true"></i>
      </div>
      <div class="q-body">
        ${item.a ? `<p class="q-answer">${item.a}</p>` : ""}
        ${item.code ? `<pre>${escHtml(item.code)}</pre>` : ""}
      </div>`;
    qlistEl.appendChild(div);
  });
}

function toggle(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector(".q-arrow");
  const open = body.classList.toggle("open");
  arrow.style.transform = open ? "rotate(180deg)" : "";
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

renderQuestions(Object.keys(data)[0]);
</script>
